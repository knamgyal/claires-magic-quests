<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chore Quest - A gamified task manager for kids">
  <title>Chore Quest - Multi-User</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive, sans-serif; }

    .animated-bg {
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .celebration {
      animation: celebrate 0.6s ease-in-out;
    }

    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1) rotate(-5deg); }
      50% { transform: scale(1.2) rotate(5deg); }
      75% { transform: scale(1.1) rotate(-3deg); }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .timer-pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .badge-shimmer {
      position: relative;
      overflow: hidden;
    }

    .badge-shimmer::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Theme Variables */
    .theme-space { --primary: #4F46E5; --secondary: #7C3AED; --accent: #EC4899; }
    .theme-ocean { --primary: #0EA5E9; --secondary: #06B6D4; --accent: #3B82F6; }
    .theme-forest { --primary: #10B981; --secondary: #059669; --accent: #34D399; }
    .theme-sunset { --primary: #F59E0B; --secondary: #EF4444; --accent: #F97316; }
    .theme-candy { --primary: #EC4899; --secondary: #A855F7; --accent: #F472B6; }
    .theme-galaxy { --primary: #8B5CF6; --secondary: #6366F1; --accent: #A78BFA; }
    .theme-nature { --primary: #84CC16; --secondary: #22C55E; --accent: #65A30D; }
    .theme-fire { --primary: #DC2626; --secondary: #EA580C; --accent: #F87171; }

    /* Emoji Picker Styles */
    .emoji-picker {
      max-height: 300px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
    }

    .emoji-item {
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s;
      text-align: center;
    }

    .emoji-item:hover {
      background-color: rgba(0,0,0,0.1);
      transform: scale(1.2);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      animation: fadeIn 0.2s;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Settings Icon Fix */
    .settings-icon {
      font-size: 24px;
    }
  </style>
</head>

    // ============ BADGES ============
    const BADGES = [

      { id: 'early-bird', title: 'Early Bird', icon: '🐦', condition: (quests) => quests.filter(q => q.includes('morning')).length >= 5 },
      { id: 'math-master', title: 'Math Master', icon: '🔢', condition: (quests) => quests.filter(q => q === 'math-homework').length >= 3 },
      { id: 'organization-star', title: 'Organization Star', icon: '⭐', condition: (quests) => quests.filter(q => ['organize-toys', 'clean-room'].includes(q)).length >= 5 },
      { id: 'night-owl', title: 'Night Owl', icon: '🦉', condition: (quests) => quests.filter(q => q === 'bedtime-routine').length >= 3 },
      { id: 'reading-hero', title: 'Reading Hero', icon: '📖', condition: (quests) => quests.filter(q => q === 'reading-time').length >= 3 },
      { id: 'bear-care-master', title: 'Bear Care Master', icon: '🧸', condition: (quests) => quests.filter(q => q === 'claire-bear-routine').length >= 3 }
    ];

    // ============ EMOJI LIBRARY ============
    const EMOJI_LIBRARY = [
      '😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '🙂', '🙃', '😉', '😊', '😇', '🥰', '😍', '🤩',
      '😘', '😗', '😚', '😙', '😋', '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭', '🤫', '🤔', '🤐', '🤨',
      '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔',
      '🦄', '🐝', '🐛', '🦋', '🐌', '🐞', '🐢', '🐍', '🦎', '🦖', '🦕', '🐙', '🦑', '🦐', '🦀', '🐡',
      '🌸', '🌺', '🌻', '🌷', '🌹', '🥀', '🌲', '🌳', '🌴', '🌵', '🌾', '🌿', '☘️', '🍀', '🍁', '🍂',
      '🍇', '🍈', '🍉', '🍊', '🍋', '🍌', '🍍', '🥭', '🍎', '🍏', '🍐', '🍑', '🍒', '🍓', '🥝', '🍅',
      '⚽', '🏀', '🏈', '⚾', '🥎', '🎾', '🏐', '🏉', '🥏', '🎱', '🪀', '🏓', '🏸', '🏒', '🏑', '🥍',
      '🎨', '🎭', '🎪', '🎬', '🎤', '🎧', '🎼', '🎹', '🥁', '🎷', '🎺', '🎸', '🪕', '🎻', '🎲', '🎯',
      '🚗', '🚕', '🚙', '🚌', '🚎', '🏎️', '🚓', '🚑', '🚒', '🚐', '🛻', '🚚', '🚛', '🚜', '🦯', '🦽',
      '⭐', '🌟', '✨', '💫', '🌠', '🌈', '☀️', '🌤️', '⛅', '🌥️', '☁️', '🌦️', '🌧️', '⛈️', '🌩️', '🌨️',
      '📚', '📖', '📝', '✏️', '✒️', '🖊️', '🖍️', '📕', '📗', '📘', '📙', '📓', '📔', '📒', '📃', '📄',
      '🧹', '🧺', '🧻', '🧼', '🧽', '🧴', '🛁', '🚿', '🚽', '🪠', '🪣', '🧯', '🛒', '🎁', '🎀', '🎊'
    ];

    // ============ THEMES ============
    const THEMES = [
      { id: 'space', name: 'Space Adventure', emoji: '🚀', gradient: 'from-indigo-600 to-purple-700' },
      { id: 'ocean', name: 'Ocean Explorer', emoji: '🌊', gradient: 'from-blue-500 to-cyan-500' },
      { id: 'forest', name: 'Forest Friend', emoji: '🌲', gradient: 'from-green-500 to-emerald-600' },
      { id: 'sunset', name: 'Sunset Paradise', emoji: '🌅', gradient: 'from-amber-500 to-red-500' },
      { id: 'candy', name: 'Candy Land', emoji: '🍭', gradient: 'from-pink-500 to-purple-500' },
      { id: 'galaxy', name: 'Galaxy Quest', emoji: '🌌', gradient: 'from-purple-600 to-indigo-600' },
      { id: 'nature', name: 'Nature Trail', emoji: '🦋', gradient: 'from-lime-500 to-green-600' },
      { id: 'fire', name: 'Fire Dragon', emoji: '🐉', gradient: 'from-red-600 to-orange-600' }
    ];

    // ============ MAIN APP ============
    function ChoreQuestApp() {
      // Authentication State
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [loginEmail, setLoginEmail] = useState('');
      const [loginPin, setLoginPin] = useState('');
      const [loginError, setLoginError] = useState('');

      // App State
      const [quests, setQuests] = useState(QUEST_TEMPLATES);
      const [completedQuests, setCompletedQuests] = useState([]);
      const [badges, setBadges] = useState([]);
      const [redemptions, setRedemptions] = useState([]);
      const [totalStarsEarned, setTotalStarsEarned] = useState(0);
      const [currentTheme, setCurrentTheme] = useState('space');
      const [activeQuest, setActiveQuest] = useState(null);
      const [timeRemaining, setTimeRemaining] = useState(0);
      const [isTimerRunning, setIsTimerRunning] = useState(false);
      const [view, setView] = useState('dashboard');
      const [showModal, setShowModal] = useState(null);
      const [pinInput, setPinInput] = useState('');
      const [wakeLock, setWakeLock] = useState(null);
      const timerRef = useRef(null);

      // Custom Quest State
      const [newQuestTitle, setNewQuestTitle] = useState('');
      const [newQuestDuration, setNewQuestDuration] = useState(10);
      const [newQuestStars, setNewQuestStars] = useState(1);
      const [newQuestCategory, setNewQuestCategory] = useState('Chore');
      const [newQuestIcon, setNewQuestIcon] = useState('✨');
      const [showEmojiPicker, setShowEmojiPicker] = useState(false);
      const [emojiSearch, setEmojiSearch] = useState('');

      // Check for existing session
      useEffect(() => {
        const sessionUser = localStorage.getItem('currentUser');
        if (sessionUser) {
          const userData = JSON.parse(sessionUser);
          setCurrentUser(userData);
          setIsAuthenticated(true);
          loadUserData(userData.email);
        }
      }, []);

      // Load user data
      const loadUserData = (email) => {
        const userKey = `user_${email}`;
        try {
          const savedData = localStorage.getItem(userKey);
          if (savedData) {
            const data = JSON.parse(savedData);
            setCompletedQuests(data.completedQuests || []);
            setBadges(data.badges || []);
            setRedemptions(data.redemptions || []);
            setTotalStarsEarned(data.totalStarsEarned || 0);
            setCurrentTheme(data.currentTheme || 'space');

            // Load custom quests
            const customQuests = data.customQuests || [];
            setQuests([...QUEST_TEMPLATES, ...customQuests]);
          } else {
            // First time user - load preserved data if exists
            const profile = USER_PROFILES[email];
            if (profile && profile.preservedData) {
              const preserved = profile.preservedData;
              setCompletedQuests(preserved.completedQuests);
              setBadges(preserved.badges);
              setRedemptions(preserved.redemptions);
              setTotalStarsEarned(preserved.totalStarsEarned);
              saveUserData(email, {
                completedQuests: preserved.completedQuests,
                badges: preserved.badges,
                redemptions: preserved.redemptions,
                totalStarsEarned: preserved.totalStarsEarned,
                currentTheme: 'space',
                customQuests: []
              });
            }
          }
          // Check badges after loading
          checkBadges(savedData ? JSON.parse(savedData).completedQuests : USER_PROFILES[email]?.preservedData?.completedQuests || []);
        } catch (error) {
          console.error('Error loading user data:', error);
          setCompletedQuests([]);
          setBadges([]);
          setRedemptions([]);
          setTotalStarsEarned(0);
        }
      };

      // Save user data
      const saveUserData = (email, data) => {
        const userKey = `user_${email}`;
        localStorage.setItem(userKey, JSON.stringify(data));
      };

      // Handle login
      const handleLogin = (e) => {
        e.preventDefault();
        setLoginError('');

        const profile = USER_PROFILES[loginEmail];
        if (!profile) {
          setLoginError('Email not found');
          return;
        }

        if (profile.pin !== loginPin) {
          setLoginError('Incorrect PIN');
          return;
        }

        const userData = {
          email: loginEmail,
          childName: profile.childName,
          pin: profile.pin
        };

        localStorage.setItem('currentUser', JSON.stringify(userData));
        setCurrentUser(userData);
        setIsAuthenticated(true);
        loadUserData(loginEmail);
      };

      // Handle logout
      const handleLogout = () => {
        localStorage.removeItem('currentUser');
        setIsAuthenticated(false);
        setCurrentUser(null);
        setLoginEmail('');
        setLoginPin('');
        setView('dashboard');
      };

      // Calculate current stars
      const getCurrentStars = () => {
        const earned = totalStarsEarned;
        const redeemed = redemptions.reduce((sum, r) => sum + r.stars, 0);
        return earned - redeemed;
      };

      // Check and unlock badges
      const checkBadges = (questList = completedQuests) => {
        const newBadges = [];
        BADGES.forEach(badge => {
          if (!badges.includes(badge.id) && badge.condition(questList)) {
            newBadges.push(badge.id);
          }
        });
        if (newBadges.length > 0) {
          const updatedBadges = [...badges, ...newBadges];
          setBadges(updatedBadges);
          saveData({ badges: updatedBadges });
        }
      };

      // Save all data
      const saveData = (updates = {}) => {
        if (!currentUser) return;

        const customQuests = quests.filter(q => q.deletable);
        const data = {
          completedQuests: updates.completedQuests !== undefined ? updates.completedQuests : completedQuests,
          badges: updates.badges !== undefined ? updates.badges : badges,
          redemptions: updates.redemptions !== undefined ? updates.redemptions : redemptions,
          totalStarsEarned: updates.totalStarsEarned !== undefined ? updates.totalStarsEarned : totalStarsEarned,
          currentTheme: updates.currentTheme !== undefined ? updates.currentTheme : currentTheme,
          customQuests: updates.customQuests !== undefined ? updates.customQuests : customQuests
        };

        saveUserData(currentUser.email, data);
      };

      // Start quest
      const startQuest = async (quest) => {
        setActiveQuest(quest);
        setTimeRemaining(quest.duration * 60);
        setIsTimerRunning(true);
        setView('active-quest');

        // Request wake lock for mobile
        if ('wakeLock' in navigator) {
          try {
            const lock = await navigator.wakeLock.request('screen');
            setWakeLock(lock);
          } catch (err) {
            console.log('Wake Lock error:', err);
          }
        }
      };

      // Timer effect
      useEffect(() => {
        if (isTimerRunning && timeRemaining > 0) {
          timerRef.current = setTimeout(() => {
            setTimeRemaining(timeRemaining - 1);
          }, 1000);
        } else if (timeRemaining === 0 && isTimerRunning) {
          completeQuest(activeQuest);
        }

        return () => {
          if (timerRef.current) {
            clearTimeout(timerRef.current);
          }
        };
      }, [isTimerRunning, timeRemaining]);

      // Complete quest
      const completeQuest = (quest) => {
        setIsTimerRunning(false);
        if (wakeLock) {
          wakeLock.release();
          setWakeLock(null);
        }

        const newCompleted = [...completedQuests, quest.id];
        const newTotalStars = totalStarsEarned + quest.stars;

        setCompletedQuests(newCompleted);
        setTotalStarsEarned(newTotalStars);

        checkBadges(newCompleted);

        saveData({
          completedQuests: newCompleted,
          totalStarsEarned: newTotalStars
        });

        setShowModal('celebration');
        setTimeout(() => {
          setShowModal(null);
          setActiveQuest(null);
          setView('dashboard');
        }, 3000);
      };

      // Complete quest early (with PIN)
      const completeQuestEarly = () => {
        if (pinInput === currentUser.pin) {
          completeQuest(activeQuest);
          setPinInput('');
        } else {
          alert('Incorrect PIN');
          setPinInput('');
        }
      };

      // Cancel quest
      const cancelQuest = () => {
        if (confirm('Are you sure you want to cancel this quest?')) {
          setIsTimerRunning(false);
          if (wakeLock) {
            wakeLock.release();
            setWakeLock(null);
          }
          setActiveQuest(null);
          setView('dashboard');
        }
      };

      // Redeem reward
      const redeemReward = (reward) => {
        const currentStars = getCurrentStars();
        if (currentStars >= reward.stars) {
          const newRedemption = {
            reward: reward.title,
            stars: reward.stars,
            date: new Date().toISOString().split('T')[0]
          };
          const newRedemptions = [...redemptions, newRedemption];
          setRedemptions(newRedemptions);
          saveData({ redemptions: newRedemptions });
          alert(`🎉 ${reward.title} redeemed! Enjoy!`);
        } else {
          const needed = reward.stars - currentStars;
          alert(`You need ${needed} more star${needed > 1 ? 's' : ''} to redeem ${reward.title}`);
        }
      };

      // Add custom quest
      const addCustomQuest = () => {
        if (!newQuestTitle.trim()) {
          alert('Please enter a quest title');
          return;
        }

        const customQuest = {
          id: `custom-${Date.now()}`,
          title: newQuestTitle,
          duration: newQuestDuration,
          stars: newQuestStars,
          category: newQuestCategory,
          icon: newQuestIcon,
          deletable: true
        };

        const updatedQuests = [...quests, customQuest];
        setQuests(updatedQuests);

        const customQuests = updatedQuests.filter(q => q.deletable);
        saveData({ customQuests });

        // Reset form
        setNewQuestTitle('');
        setNewQuestDuration(10);
        setNewQuestStars(1);
        setNewQuestCategory('Chore');
        setNewQuestIcon('✨');
        setShowModal(null);
      };

      // Delete quest (with PIN)
      const deleteQuest = (questId) => {
        const quest = quests.find(q => q.id === questId);

        if (!quest.deletable) {
          // Need parent PIN for default quests
          const pin = prompt('Enter Parent PIN to delete this quest:');
          if (pin !== currentUser.pin) {
            alert('Incorrect PIN');
            return;
          }
        }

        if (confirm(`Delete "${quest.title}"?`)) {
          const updatedQuests = quests.filter(q => q.id !== questId);
          setQuests(updatedQuests);

          const customQuests = updatedQuests.filter(q => q.deletable);
          saveData({ customQuests });
        }
      };

      // Format time
      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      // Get quest stats
      const getQuestStats = () => {

                        className={`p-4 rounded-xl text-left transition-all ${
                          currentTheme === theme.id
                            ? 'bg-gradient-to-br ' + theme.gradient + ' text-white shadow-lg transform scale-105'
                            : 'bg-gray-100 hover:bg-gray-200'
                        }`}
                      >
                        <div className="text-2xl mb-1">{theme.emoji}</div>
                        <div className="font-semibold text-sm">{theme.name}</div>
                      </button>
                    ))}
                  </div>
                </div>

                <button
                  onClick={() => setShowModal(null)}
                  className="w-full bg-indigo-500 text-white py-3 rounded-xl font-bold hover:bg-indigo-600 transition-colors"
                >
                  Done
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Render App
    ReactDOM.render(<ChoreQuestApp />, document.getElementById('root'));
  </script>
</body>
</html>
